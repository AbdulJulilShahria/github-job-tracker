<body class="bg-gray-100 font-sans">

    <!-- Navbar -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <div class="flex items-center gap-3">
                <img src="./assets/github-logo.png" class="w-8">
                <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
            </div>

            <div class="flex items-center gap-4">

                <input type="text" placeholder="Search issues..."
                    class="border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-purple-500">

                <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium">
                    + New Issue
                </button>

            </div>

        </div>
    </header>


    <!-- Main -->
    <div class="max-w-7xl mx-auto p-6">

        <!-- Filters -->
        <div class="bg-white p-4 rounded-xl shadow mb-6 flex gap-3">

            <button class="bg-indigo-600 text-white px-8 py-2 rounded-lg text-sm">All</button>
            <button class="border px-8 py-2 rounded-lg text-sm">Closed</button>
            <button class="border px-8 py-2 rounded-lg text-sm">Open</button>

        </div>


        <!-- Issue Header -->
        <div class="bg-white p-5 rounded-xl shadow mb-6 flex justify-between items-center">
            <div class="flex gap-2 items-center">
                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>

                <div>
                    <h2 class="font-semibold text-lg">50 Issues</h2>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                </div>

            </div>
            <div class="flex items-center gap-4 text-sm">

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    Open
                </div>

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    Closed
                </div>

            </div>

        </div>


        <!-- Issues Grid -->
        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
