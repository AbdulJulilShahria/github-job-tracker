<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G I T | Login</title>
    <link rel="stylesheet" href="./style.css">

    <!-- tailwindcss and daisyui  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>







<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

        <!-- Logo -->
        <div class="flex justify-center mb-4">
            <img src="./assets/github-logo.png " class="w-16 h-16">
        </div>

        <!-- Title -->
        <h1 class="text-2xl font-bold text-center text-gray-800">GitHub Issues Tracker</h1>
        <p class="text-center text-gray-500 text-sm mt-1 mb-6">Sign in to manage your issues</p>

        <!-- Login Form -->
        <form class="space-y-4">

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input id="inputUsername" type="text" placeholder="Enter Username" minlength="5" maxlength="11"
                    value="admin"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">

                <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password </label>

                <input id="inputPassword" type="password" placeholder="Enter Password" minlength="7" maxlength="11"
                    value="admin123"
                    class="w-full  px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">

                <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
            </div>

            <!-- Button -->
            <button type="submit" onclick="signIn(event)"
                class="w-full py-3 mt-2 text-white font-semibold rounded-lg bg-indigo-600 shadow-md cursor-pointer">Sign
                In</button>

        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
            <hr class="grow border-gray-300">
            <span class="mx-3 text-gray-400 text-sm">OR</span>
            <hr class="grow border-gray-300">
        </div>

        <!-- Demo Credentials -->
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 text-sm text-gray-700">
            <p class="font-medium mb-2">Demo Credentials:</p>
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
        </div>

    </div>









    <script src="./script.js"></script>
</body>

</html>
